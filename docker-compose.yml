services:
  hermes:
    image: genichin/js-hermes-agent:latest
    build:
      context: .
      args:
        BASE_TAG: latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"   # gateway API
      - "9119:9119"   # dashboard (HERMES_DASHBOARD=1일 때)
      - "2222:22"     # sshd (HERMES_SSHD=1일 때)
    volumes:
      - ~/.hermes:/opt/data
    environment:
      - HERMES_DASHBOARD=1
      # 주의: 대시보드는 non-loopback 바인드 시 인증 제공자가 없으면 기동 자체가
      # 실패함(fail-closed). 아래 basic auth 를 설정하거나 HERMES_DASHBOARD 를 끌 것.
      - HERMES_DASHBOARD_BASIC_AUTH_USERNAME=${DASHBOARD_USER:-admin}
      - HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=${DASHBOARD_PASSWORD:?DASHBOARD_PASSWORD 환경변수를 설정하세요}
      # sshd: 공개키 인증만 허용. 공개키는 호스트의 ~/.hermes/.ssh/authorized_keys 에
      # 넣거나, 아래 HERMES_SSHD_AUTHORIZED_KEYS 로 주입.
      - HERMES_SSHD=1
      # - HERMES_SSHD_AUTHORIZED_KEYS=ssh-ed25519 AAAA... user@host
      # 사용자 서비스 자동 실행: ~/.hermes/workspace/services/<이름>/run
      - HERMES_USER_SERVICES=1
      # .env 파일 대신 환경변수를 직접 전달하려면 주석 해제:
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    shm_size: "1g"    # Playwright/브라우저 도구용
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
